name: Conformance Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    name: Run conformance gate (5/5)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Conformance gate
        run: python gate.py
        env:
          # Set BANNED_TOKENS in repo Settings → Secrets → Actions.
          # One token per line. Check A is skipped if the secret is not set.
          BANNED_TOKENS: ${{ secrets.BANNED_TOKENS }}
